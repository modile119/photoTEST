        // ==========================================
        // 初始化與題庫解析
        // ==========================================
        function initSystem() {
            // 1. 清理常見的 PDF 轉檔雜訊、浮水印、頁碼
            let cleanedData = rawTextData
                .replace(/--- PAGE \d+ ---/gi, '')
                .replace(/Page \d+ of \d+/gi, '')
                .replace(/9000[6-9].*?工作項目.*?\n/g, '')
                .replace(/WORORCE|LOPMENT AGENCY M|STRY OF LABOR|MINISTRY OF LABOR|WORKFORCE DEV|WDA/gi, '')
                .replace(/\n定\n/g, '')
                .replace(/\[Image \d+\]/g, '');

            // 2. 升級版正則表達式，支援跨行容錯解析
            const regex = /(\d+)\.\s*\(([1-4])\)\s*([\s\S]*?)①([\s\S]*?)②([\s\S]*?)③([\s\S]*?)④([\s\S]*?)(?=(?:\d+\.\s*\([1-4]\))|$)/g;
            let match;
            while ((match = regex.exec(cleanedData)) !== null) {
                parsedQuestions.push({
                    ans: parseInt(match[2]) - 1, 
                    q: match[3].trim().replace(/\s+/g, ' '), 
                    options: [
                        match[4].trim().replace(/\s+/g, ' '),
                        match[5].trim().replace(/\s+/g, ' '),
                        match[6].trim().replace(/\s+/g, ' '),
                        match[7].trim().replace(/\s+/g, ' ')
                    ]
                });
            }
            console.log(`已成功載入 ${parsedQuestions.length} 題題庫`);
        }

        function startExam() {
            const name = document.getElementById('student-name').value.trim();
            if (!name) {
                alert("請填寫姓名！");
                return;
            }

            // 準備考試資料
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('exam-screen').classList.remove('hidden');
            document.getElementById('top-bar').classList.remove('hidden');
            
            // 隨機抽選題目 (若題庫夠大則抽 TOTAL_QUESTIONS 題，否則全出)
            let shuffled = [...parsedQuestions].sort(() => 0.5 - Math.random());
            currentExam = shuffled.slice(0, Math.min(TOTAL_QUESTIONS, parsedQuestions.length));
            
            renderQuestions();
            
            // 啟動計時器
            startTime = new Date();
            timerInterval = setInterval(updateTimer, 1000);
        }

        function renderQuestions() {
            const container = document.getElementById('questions-container');
            container.innerHTML = '';

            currentExam.forEach((item, index) => {
                const qDiv = document.createElement('div');
                qDiv.className = 'bg-white rounded-lg shadow-md p-6 border border-gray-200';
                qDiv.id = `q-container-${index}`;
                
                let html = `<div class="font-bold text-lg mb-4 text-gray-800"><span class="text-blue-600 mr-2">Q${index + 1}.</span>${item.q}</div>`;
                html += `<div class="space-y-3 pl-2">`;
                
                item.options.forEach((opt, optIdx) => {
                    html += `
                        <label id="label-${index}-${optIdx}" class="flex items-start p-3 border rounded-lg cursor-pointer hover:bg-blue-50 transition duration-150">
                            <input type="radio" name="q${index}" value="${optIdx}" class="mt-1 mr-3 h-4 w-4 text-blue-600" onchange="recordAnswer(${index}, ${optIdx})">
                            <span class="text-gray-700">${opt}</span>
                        </label>
                    `;
                });
                
                html += `</div>`;
                qDiv.innerHTML = html;
                container.appendChild(qDiv);
            });
        }

        function recordAnswer(qIndex, optIndex) {
            userAnswers[qIndex] = optIndex;
        }

        function updateTimer() {
            const now = new Date();
            const diff = Math.floor((now - startTime) / 1000);
            const m = String(Math.floor(diff / 60)).padStart(2, '0');
            const s = String(diff % 60).padStart(2, '0');
            document.getElementById('timer').innerText = `${m}:${s}`;
        }

        // ==========================================
        // 測驗批改與訂正邏輯
        // ==========================================
        function submitExam() {
            // 檢查是否全答
            const unanswered = currentExam.length - Object.keys(userAnswers).length;
            if (unanswered > 0) {
                showModal("尚未完成", `您還有 ${unanswered} 題未作答，確定要交卷嗎？`, true, () => {
                    processSubmit();
                });
            } else {
                processSubmit();
            }
        }

        function processSubmit() {
            clearInterval(timerInterval);
            isCorrectionMode = true;

            let correctCount = 0;
            let hasWrong = false;

            currentExam.forEach((item, index) => {
                const userAns = userAnswers[index];
                const qContainer = document.getElementById(`q-container-${index}`);
                
                if (userAns === item.ans) {
                    correctCount++;
                    // 答對的題目隱藏，專注於錯題
                    qContainer.classList.add('hidden');
                } else {
                    hasWrong = true;
                    // 標示出錯的選項
                    if (userAns !== undefined) {
                        document.getElementById(`label-${index}-${userAns}`).classList.add('wrong-bg');
                    }
                    // 加上錯題提示
                    if (!document.getElementById(`wrong-msg-${index}`)) {
                        const msg = document.createElement('div');
                        msg.id = `wrong-msg-${index}`;
                        msg.className = "mt-3 text-red-600 font-semibold text-sm";
                        msg.innerText = "❌ 答錯了，請重新選擇正確答案以進行訂正。";
                        qContainer.appendChild(msg);
                    }
                }
            });

            finalScore = (correctCount * POINT_PER_QUESTION).toFixed(2);
            
            // 顯示分數
            const scoreDisplay = document.getElementById('score-display');
            scoreDisplay.innerText = `得分: ${finalScore}`;
            scoreDisplay.classList.remove('hidden');

            document.getElementById('submit-btn').classList.add('hidden');

            if (hasWrong) {
                showModal("交卷成功！", `您的得分為 ${finalScore} 分。\n\n系統已隱藏答對的題目，請將留下的錯題重新選擇正確答案，才能完成測驗。`);
                document.getElementById('verify-btn').classList.remove('hidden');
                window.scrollTo(0, 0);
            } else {
                // 全對直接完成
                showResultScreen();
            }
        }

        function verifyCorrections() {
            let allCorrected = true;

            currentExam.forEach((item, index) => {
                // 如果這題原本答錯 (沒有被 hidden)
                const qContainer = document.getElementById(`q-container-${index}`);
                if (!qContainer.classList.contains('hidden')) {
                    const currentSelected = document.querySelector(`input[name="q${index}"]:checked`);
                    
                    // 重置此題所有選項樣式
                    for(let i=0; i<4; i++) {
                        document.getElementById(`label-${index}-${i}`).classList.remove('wrong-bg', 'correct-bg');
                    }

                    if (currentSelected && parseInt(currentSelected.value) === item.ans) {
                        // 訂正正確
                        document.getElementById(`label-${index}-${item.ans}`).classList.add('correct-bg');
                        document.getElementById(`wrong-msg-${index}`).innerText = "✅ 訂正正確！";
                        document.getElementById(`wrong-msg-${index}`).className = "mt-3 text-green-600 font-semibold text-sm";
                        
                        // 鎖定選項
                        for(let i=0; i<4; i++) {
                            const input = document.querySelector(`input[name="q${index}"][value="${i}"]`);
                            input.disabled = true;
                            document.getElementById(`label-${index}-${i}`).classList.add('disabled-label');
                        }
                    } else {
                        // 依然錯誤
                        allCorrected = false;
                        if (currentSelected) {
                            document.getElementById(`label-${index}-${currentSelected.value}`).classList.add('wrong-bg');
                        }
                    }
                }
            });

            if (allCorrected) {
                document.getElementById('verify-btn').classList.add('hidden');
                document.getElementById('finish-btn').classList.remove('hidden');
                showModal("太棒了！", "所有錯題皆已訂正完畢。\n請點擊下方的「完成測驗並上傳成績」。");
            } else {
                showModal("尚未完成訂正", "還有題目未訂正正確，請再檢查一下紅色標示的選項喔！");
            }
        }

        // ==========================================
        // 結算與資料上傳
        // ==========================================
        function showResultScreen() {
            document.getElementById('exam-screen').classList.add('hidden');
            document.getElementById('top-bar').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');

            const name = document.getElementById('student-name').value;
            const timeStr = document.getElementById('timer').innerText;

            document.getElementById('res-name').innerText = name;
            document.getElementById('res-score').innerText = finalScore;
            document.getElementById('res-time').innerText = timeStr;
        }

        async function finishExam() {
            showResultScreen();
            
            const name = document.getElementById('student-name').value;
            const studentId = document.getElementById('student-id').value || "無";
            const timeStr = document.getElementById('timer').innerText;
            const statusText = document.getElementById('upload-status');
            
            statusText.innerText = "⏳ 正在上傳成績至伺服器...";
            statusText.className = "text-sm font-semibold text-blue-500";

            // 如果教師未設定 GAS_URL，則略過上傳
            if (GAS_URL.includes("請在此貼上")) {
                statusText.innerText = "⚠️ 成績已結算 (教師尚未設定 Google Sheets 連線，無上傳紀錄)。";
                statusText.className = "text-sm font-semibold text-yellow-600 mt-4";
                return;
            }

            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors', // 避免跨域阻擋問題
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        name: name,
                        studentId: studentId,
                        score: finalScore,
                        duration: timeStr
                    })
                });
                
                // 因使用 no-cors，無法精準捕捉 status code，直接顯示成功提示
                statusText.innerText = "✅ 測驗紀錄已成功上傳給老師！您可以關閉此視窗。";
                statusText.className = "text-sm font-semibold text-green-600 mt-4";
            } catch (error) {
                console.error('Error:', error);
                statusText.innerText = "❌ 網路連線錯誤，成績上傳失敗，請截圖本畫面給老師。";
                statusText.className = "text-sm font-semibold text-red-600 mt-4";
            }
        }

        // 啟動解析題庫
        initSystem();

    </script>
</body>
</html>
